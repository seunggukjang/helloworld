<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-World 법정동 지도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0C1117; --panel: #141B24; --border: #1F2D3D;
    --accent: #3B82F6; --accent2: #10B981; --danger: #EF4444;
    --warn: #F59E0B; --text: #E2E8F0; --muted: #64748B; --card: #1A2332;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .topbar { display: flex; align-items: center; padding: 0 20px; height: 52px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; }
  .logo { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--accent2); }
  .api-input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--text); outline: none; transition: border-color 0.2s; }
  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--muted); }
  .btn { padding: 7px 14px; border-radius: 6px; border: none; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563EB; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }

  .main { display: flex; flex: 1; overflow: hidden; }
  .side { width: 320px; min-width: 320px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .side-section { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .section-title { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  .search-wrap { position: relative; }
  .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 36px 9px 12px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  .search-results { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; max-height: 240px; overflow-y: auto; z-index: 200; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .search-results.open { display: block; }
  .search-item { padding: 9px 12px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: #1E3A5F; }
  .search-item-name { color: var(--text); font-weight: 500; }
  .search-item-sub { color: var(--muted); font-size: 10px; margin-top: 2px; }

  .color-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .color-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  input[type=color] { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: none; padding: 2px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }

  .layer-list-wrap { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; }
  .layer-list-wrap::-webkit-scrollbar { width: 4px; }
  .layer-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .layer-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; transition: border-color 0.15s; }
  .layer-item:hover { border-color: var(--accent); }
  .layer-swatch { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .layer-name { flex: 1; font-size: 12px; color: var(--text); cursor: pointer; line-height: 1.4; }
  .layer-sub { font-size: 10px; color: var(--muted); }
  .layer-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 0 2px; transition: color 0.15s; line-height: 1; }
  .layer-btn:hover { color: var(--danger); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 30px 20px; color: var(--muted); font-size: 12px; text-align: center; }
  .empty-icon { font-size: 28px; opacity: 0.4; }

  #map { flex: 1; position: relative; }
  .map-popup { position: absolute; background: var(--panel); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 16px; min-width: 180px; font-size: 12px; pointer-events: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 1000; }
  .popup-title { font-weight: 700; color: var(--text); font-size: 14px; margin-bottom: 2px; }
  .popup-sub { color: var(--muted); font-size: 11px; }

  .statusbar { height: 28px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; font-size: 11px; color: var(--muted); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .s-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; background: var(--muted); }

  #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 9999; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.toast-success { border-color: var(--accent2); color: var(--accent2); }
  #toast.toast-error   { border-color: var(--danger);  color: var(--danger); }
  #toast.toast-warn    { border-color: var(--warn);    color: var(--warn); }

  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">GEO<span>DONG</span></div>
  <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;white-space:nowrap;">V-WORLD KEY</span>
  <input type="password" id="api-key" class="api-input" style="width:220px;" placeholder="V-World API 키 입력">
  <button class="btn btn-primary" onclick="initMap()">지도 로드</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="btn btn-ghost btn-sm" onclick="fitAll()">전체 보기</button>
    <button class="btn btn-ghost btn-sm" onclick="clearAll()">전체 삭제</button>
  </div>
</div>

<div class="main">
  <div class="side">

    <div class="side-section">
      <div class="section-title">🔍 법정동 검색</div>
      <div class="search-wrap">
        <input class="search-input" id="search-input"
          placeholder="시/구/동 이름 입력 (예: 마포구, 해운대동)"
          autocomplete="off"
          oninput="onSearch(this.value)"
          onfocus="openResults()"
          onblur="closeResults()">
        <span class="search-icon">🔎</span>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>

    <div class="side-section">
      <div class="section-title">🎨 폴리곤 스타일</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="color-row">
          <div class="color-item">
            <input type="color" id="fill-color" value="#3B82F6">
            <span>채우기</span>
          </div>
          <div class="color-item">
            <input type="color" id="stroke-color" value="#93C5FD">
            <span>테두리</span>
          </div>
        </div>
        <div class="color-row">
          <span style="font-size:12px;color:var(--muted);white-space:nowrap;">투명도</span>
          <input type="range" id="opacity" min="5" max="85" value="35" oninput="document.getElementById('opv').textContent=this.value+'%'">
          <span id="opv" style="font-size:11px;color:var(--accent);font-family:'JetBrains Mono',monospace;min-width:30px;">35%</span>
        </div>
      </div>
    </div>

    <div class="side-section" style="padding-bottom:8px;border-bottom:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span class="section-title" style="margin-bottom:0;">📋 추가된 법정동</span>
        <span id="layer-count" style="font-size:11px;color:var(--accent);">0개</span>
      </div>
    </div>

    <div class="layer-list-wrap" id="layer-list">
      <div class="empty-state">
        <div class="empty-icon">🗺</div>
        <div>법정동을 검색해서<br>지도에 추가하세요</div>
      </div>
    </div>
  </div>

  <div id="map">
    <div class="map-popup" id="popup" style="display:none;"></div>
  </div>
</div>

<div class="statusbar">
  <span><span class="s-dot" id="map-dot"></span><span id="map-status">지도 미로드</span></span>
  <span>🗺 법정동 <span id="s-count">0</span>개 표시 중</span>
  <span style="margin-left:auto;font-size:10px;color:var(--border)">V-World WMTS · 경계: Nominatim OSM</span>
</div>

<div id="toast"></div>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ol3/4.6.5/ol.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ol3/4.6.5/ol.js"></script>

<script>
let map = null, mapLoaded = false;
let layers = [];
let searchTimer = null;

// 자동 색상 팔레트 (추가할 때마다 순환)
const PALETTE = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#84CC16','#F97316','#6366F1'];
let paletteIdx = 0;

// ── 지도 초기화 ──
function initMap() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) { showToast('V-World API 키를 입력해주세요', 'error'); return; }
  if (map) { map.setTarget(null); map = null; }

  map = new ol.Map({
    target: 'map',
    layers: [
      new ol.layer.Tile({
        source: new ol.source.XYZ({
          url: `https://api.vworld.kr/req/wmts/1.0.0/${key}/Base/{z}/{y}/{x}.png`,
          attributions: '© V-World',
        }),
      }),
    ],
    view: new ol.View({
      center: ol.proj.fromLonLat([127.5, 36.0]),
      zoom: 7,
    }),
  });

  const popup = document.getElementById('popup');
  map.on('pointermove', (e) => {
    let hit = false;
    map.forEachFeatureAtPixel(e.pixel, (feat) => {
      if (hit) return;
      hit = true;
      popup.style.display = 'block';
      popup.style.left = (e.pixel[0] + 14) + 'px';
      popup.style.top  = (e.pixel[1] - 10) + 'px';
      popup.innerHTML  = `<div class="popup-title">${feat.get('name') || ''}</div><div class="popup-sub">${feat.get('sub') || ''}</div>`;
      map.getTargetElement().style.cursor = 'pointer';
    });
    if (!hit) { popup.style.display = 'none'; map.getTargetElement().style.cursor = ''; }
  });

  mapLoaded = true;
  document.getElementById('map-dot').style.background = '#10B981';
  document.getElementById('map-status').textContent = '지도 로드 완료';
  showToast('V-World 지도 로드 완료!', 'success');
}

// ── 검색 ──
function onSearch(val) {
  clearTimeout(searchTimer);
  const el = document.getElementById('search-results');
  if (!val.trim()) { el.innerHTML=''; el.classList.remove('open'); return; }
  el.innerHTML = `<div class="search-item" style="color:var(--muted)">검색 중...</div>`;
  el.classList.add('open');
  searchTimer = setTimeout(() => doSearch(val.trim()), 450);
}

async function doSearch(query) {
  const el = document.getElementById('search-results');
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ' 대한민국')}&format=json&limit=10&addressdetails=1&countrycodes=kr`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'ko', 'User-Agent': 'VWorldDongMap/1.0' } });
    const data = await resp.json();

    const admin = data.filter(d =>
      d.class === 'boundary' || d.class === 'place' ||
      ['administrative','suburb','quarter','neighbourhood','borough','town','village','county'].includes(d.type)
    );

    if (!admin.length) {
      el.innerHTML = `<div class="search-item" style="color:var(--muted)">결과 없음 — 다른 이름으로 검색해보세요</div>`;
      return;
    }

    el.innerHTML = admin.slice(0, 8).map(d => {
      const parts = d.display_name.split(',');
      const name = parts[0].trim();
      const sub  = parts.slice(1, 4).map(s=>s.trim()).filter(Boolean).join(' · ');
      const otype = d.osm_type, oid = d.osm_id;
      return `<div class="search-item" onmousedown="addDong('${otype}','${oid}','${esc(name)}','${esc(sub)}')">
        <div class="search-item-name">${name}</div>
        <div class="search-item-sub">${sub}</div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="search-item" style="color:var(--danger)">오류: ${e.message}</div>`;
  }
}

function openResults() {
  if (document.getElementById('search-input').value.trim())
    document.getElementById('search-results').classList.add('open');
}
function closeResults() {
  setTimeout(() => document.getElementById('search-results').classList.remove('open'), 200);
}

// ── 법정동 추가 ──
async function addDong(osmType, osmId, name, sub) {
  if (!mapLoaded) { showToast('지도를 먼저 로드해주세요', 'error'); return; }
  if (layers.find(l => l.osmId === osmId)) { showToast(`"${name}"은 이미 추가됨`, 'warn'); return; }

  document.getElementById('search-input').value = '';
  document.getElementById('search-results').classList.remove('open');
  showToast(`"${name}" 경계 불러오는 중...`, '');

  try {
    const typeChar = { node:'N', way:'W', relation:'R' }[osmType] || 'R';
    const url = `https://nominatim.openstreetmap.org/lookup?osm_ids=${typeChar}${osmId}&format=json&polygon_geojson=1`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'ko', 'User-Agent': 'VWorldDongMap/1.0' } });
    const data = await resp.json();

    if (!data.length || !data[0].geojson) {
      showToast(`"${name}" 경계 데이터 없음 — 다른 검색어를 시도해보세요`, 'error');
      return;
    }

    // 스타일 가져오기
    const fillHex  = document.getElementById('fill-color').value;
    const strokeHex= document.getElementById('stroke-color').value;
    const opacity  = parseInt(document.getElementById('opacity').value) / 100;

    // 팔레트 자동 적용 (채우기 색 = 기본 팔레트 순환)
    const autoColor = PALETTE[paletteIdx % PALETTE.length];
    paletteIdx++;
    const useFill = fillHex;  // 사용자가 직접 지정한 색 사용

    const format   = new ol.format.GeoJSON();
    const features = format.readFeatures(data[0].geojson, { featureProjection: 'EPSG:3857' });
    features.forEach(f => { f.set('name', name); f.set('sub', sub); });

    const source  = new ol.source.Vector({ features });
    const olLayer = new ol.layer.Vector({
      source,
      style: new ol.style.Style({
        fill:   new ol.style.Fill({ color: hexToRgba(useFill, opacity) }),
        stroke: new ol.style.Stroke({ color: strokeHex, width: 2 }),
      }),
    });
    map.addLayer(olLayer);
    map.getView().fit(source.getExtent(), { padding: [50,50,50,50], duration: 700, maxZoom: 14 });

    layers.push({ id: Date.now(), osmId, name, sub, fillHex: useFill, strokeHex, opacity, visible: true, olLayer, source });
    renderLayers();
    showToast(`"${name}" 추가 완료`, 'success');
  } catch(e) {
    showToast('경계 로드 실패: ' + e.message, 'error');
  }
}

// ── 레이어 조작 ──
function toggleVisible(id) {
  const l = layers.find(x => x.id === id);
  if (!l) return;
  l.visible = !l.visible;
  l.olLayer.setVisible(l.visible);
  renderLayers();
}

function removeLayer(id) {
  const idx = layers.findIndex(x => x.id === id);
  if (idx < 0) return;
  if (map) map.removeLayer(layers[idx].olLayer);
  layers.splice(idx, 1);
  renderLayers();
}

function focusLayer(id) {
  const l = layers.find(x => x.id === id);
  if (!l || !map) return;
  map.getView().fit(l.source.getExtent(), { padding:[50,50,50,50], duration:500, maxZoom:14 });
}

function fitAll() {
  if (!map || !layers.length) return;
  const ext = ol.extent.createEmpty();
  layers.forEach(l => ol.extent.extend(ext, l.source.getExtent()));
  map.getView().fit(ext, { padding:[50,50,50,50], duration:600 });
}

function clearAll() {
  layers.forEach(l => map && map.removeLayer(l.olLayer));
  layers = [];
  renderLayers();
}

// ── 렌더 ──
function renderLayers() {
  const el = document.getElementById('layer-list');
  document.getElementById('layer-count').textContent = layers.length + '개';
  document.getElementById('s-count').textContent = layers.length;
  if (!layers.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺</div><div>법정동을 검색해서<br>지도에 추가하세요</div></div>`;
    return;
  }
  el.innerHTML = layers.map(l => `
    <div class="layer-item">
      <div class="layer-swatch" style="background:${hexToRgba(l.fillHex, l.opacity)};border:2px solid ${l.strokeHex};"></div>
      <div class="layer-name" onclick="focusLayer(${l.id})">
        ${l.name}
        <div class="layer-sub">${l.sub}</div>
      </div>
      <button class="layer-btn" onclick="toggleVisible(${l.id})" title="${l.visible?'숨기기':'보이기'}" style="color:${l.visible?'#10B981':'var(--muted)'}">
        ${l.visible ? '👁' : '🚫'}
      </button>
      <button class="layer-btn" onclick="removeLayer(${l.id})" title="삭제">✕</button>
    </div>`).join('');
}

// ── 유틸 ──
function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function esc(s) { return String(s).replace(/'/g,"\\'"); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (type ? ' toast-' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 2800);
}

document.getElementById('api-key').addEventListener('keydown', e => { if(e.key==='Enter') initMap(); });
</script>
</body>
</html>
